{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Тренировка: <span class="text-primary">{{ subject.name }}</span></h2>
        <span class="badge bg-primary fs-6">{{ tasks|length }} заданий</span>
    </div>

    <form method="POST" action="{{ url_for('main.check_exam', subject_id=subject.id) }}">
        {% for task in tasks %}
        <div class="card mb-4">
            <div class="card-header bg-white border-bottom">
                <h5 class="mb-0">Задание {{ loop.index }}</h5>
            </div>
            <div class="card-body">
                <p class="fs-5 lh-base">{{ task.text | safe }}</p>
                
                <input type="hidden" name="task_id_{{ task.id }}" value="{{ task.id }}">
                <input type="text" 
                       name="answer_{{ task.id }}" 
                       class="form-control form-control-lg"
                       placeholder="Напишите ответ сюда..."
                       autocomplete="off" autocorrect="off" spellcheck="false"
                       required>
            </div>
        </div>
        {% endfor %}

        <div class="text-center mt-5">
            <button type="submit" class="btn btn-success btn-lg px-5 py-3">✅ Проверить все ответы</button>
            <a href="/dashboard" class="btn btn-secondary btn-lg px-5 py-3 ms-3">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}

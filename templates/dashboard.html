{% extends "base.html" %}

{% block content %}
<div class="text-center mb-5">
    <h1 class="display-5 fw-bold">Выберите предмет</h1>
    <p class="lead text-muted">Тренируйтесь регулярно — прогресс не заставит себя ждать</p>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for subject in subjects %}
    <div class="col">
        <div class="card h-100 shadow-sm hover-card">
            <div class="card-body d-flex flex-column justify-content-center py-5 text-center">
                <h4 class="card-title mb-4">{{ subject.name }}</h4>
                <a href="/subject/{{ subject.id }}" 
                   class="btn btn-primary btn-lg mt-auto">
                    Начать тренировку →
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

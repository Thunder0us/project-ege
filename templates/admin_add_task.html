{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Добавить новое задание</h2>
    
    <form method="POST" class="mt-4">
        <div class="mb-3">
            <label class="form-label">Предмет</label>
            <select name="subject_id" class="form-select" required>
                {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Название темы</label>
            <input type="text" name="topic_name" class="form-control" placeholder="Например: Квадратные уравнения" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Текст задания</label>
            <textarea name="task_text" class="form-control" rows="4" required></textarea>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Правильный ответ</label>
            <input type="text" name="correct_answer" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Объяснение / решение</label>
            <textarea name="explanation" class="form-control" rows="6"></textarea>
        </div>
        
        <button type="submit" class="btn btn-success">Добавить задание</button>
        <a href="/dashboard" class="btn btn-secondary">Назад</a>
    </form>
</div>
{% endblock %}

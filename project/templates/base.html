<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЕГЭ Подготовка</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-5" href="/">📚 ЕГЭ Подготовка</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto">
                    <a href="/dashboard" class="btn btn-light btn-sm me-2">🎓 Выбрать предмет</a>
                    <a href="/profile" class="btn btn-outline-light btn-sm me-2">👤 Профиль</a>
                    <a href="/admin/add_task" class="btn btn-outline-warning btn-sm me-2">⚙️ Админ</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'success' if category == 'success' else 'warning' if category == 'warning' else 'danger' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">© 2026 ЕГЭ Подготовка • v1.0</p>
    </footer>

    <script src="/static/bootstrap.bundle.min.js"></script>
</body>
</html>
